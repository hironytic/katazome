[[tagDefinition.code]]
start = "/*{%"
end = "%}*/"

[[tagDefinition.code]]
start = "/*{%-"
end = "-%}*/"
trim = "both"

[[tagDefinition.comment]]
start = "/*{#"
end = "#}*/"

[[files]]
pattern = "*.c"

[[files.tagDefinition.value]]
start = "_V_"
end = "_"

[[files.tagDefinition.value]]
start = "_V(\""
end = "\")"

[[files]]
pattern = "*.ts"

[[files.tagDefinition.value]]
start = "_V_"
end = "_"
